[pytest]
testpaths = dev/tests
python_files = test_*.py
python_functions = test_*
cache_dir = .cache/pytest
markers =
    network: requests PubChem over HTTPS (skip in air-gapped CI)
    orca: runs inexpensive ORCA Opt for geometry seeds (skip without ORCA)
    slow: long cheap-opt legs (large molecules); often combined with network+orca
