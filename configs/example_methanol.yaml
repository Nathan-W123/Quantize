# Methanol (ground torsional state, νt=0) — generalized input file
# Run with:
#   PYTHONPATH=. .venv/bin/python runner/run_from_config.py configs/example_methanol.yaml
#
# Atom order follows the methanol runner:
#   C, O, Hc1, Hc2, Hc3, Ho

name: methanol_vt0
spectral_model: internal_rotor_bc

# Coordinate mode:
#   internal  -> bond/angle(/dihedral) optimization
#   cartesian -> xyz optimization
coordinate_mode: internal
internal_coordinates:
  use_dihedrals: true
  damping: 1.0e-6
  microiterations: 20
  prior_weight: 1.0
  prior_sigma_bond: 0.06
  prior_sigma_angle_deg: 4.0
  prior_sigma_dihedral_deg: 20.0

elements: [C, O, H, H, H, H]

# PubChem methanol geometry (MMFF) as seed.
geometry:
  smiles: CO

# Methanol equilibrium minimum is approximately Cs, but multistart jitter
# can break exact symmetry; keep unconstrained to avoid permutation failures.
symmetry: null

isotopologues:
  - name: 12CH3-16OH
    masses: [12.0, 15.99491461957, 1.00782503207, 1.00782503207, 1.00782503207, 1.00782503207]
    components: [A, B, C]
    obs_b0_mhz: [127523.4, 24692.5, 23760.3]
    alpha_mhz: [0.0, 0.0, 0.0]
    sigma_mhz: [2.0, 0.05, 0.05]

  - name: 13CH3-16OH
    masses: [13.00335483507, 15.99491461957, 1.00782503207, 1.00782503207, 1.00782503207, 1.00782503207]
    components: [A, B, C]
    obs_b0_mhz: [126941.4, 23747.3, 22865.9]
    alpha_mhz: [0.0, 0.0, 0.0]
    sigma_mhz: [2.0, 0.05, 0.05]

  - name: 12CH3-18OH
    masses: [12.0, 17.99915961286, 1.00782503207, 1.00782503207, 1.00782503207, 1.00782503207]
    components: [A, B, C]
    obs_b0_mhz: [127285.3749, 23651.2578, 22787.1066]
    alpha_mhz: [0.0, 0.0, 0.0]
    sigma_mhz: [2.0, 0.05, 0.05]

  - name: CH3OD
    masses: [12.0, 15.99491461957, 1.00782503207, 1.00782503207, 1.00782503207, 2.01410177785]
    components: [A, B, C]
    obs_b0_mhz: [127549.4, 22839.1, 22116.9]
    alpha_mhz: [0.0, 0.0, 0.0]
    sigma_mhz: [10.0, 0.2, 0.2]

  - name: CD3OH
    masses: [12.0, 15.99491461957, 2.01410177785, 2.01410177785, 2.01410177785, 1.00782503207]
    components: [A, B, C]
    obs_b0_mhz: [70819.0, 19856.0, 19266.0]
    alpha_mhz: [0.0, 0.0, 0.0]
    sigma_mhz: [5.0, 0.05, 0.05]

quantum:
  backend: orca
  method: wB97X-D4
  basis: def2-TZVPP
  executable: null

preset: BALANCED
rng_seed: 31
write_xyz: false

# Optional rovibrational correction block
rovibrational_corrections:
  mode: hybrid_auto

# ── Torsion Hamiltonian block (RAM-lite) ─────────────────────────────────────
#
# Parameters seeded from the CH3OH global RAM fit
# (Xu et al., J. Mol. Spectrosc. 251 (2008) 305-313):
#   F   = 27.64684641 cm^-1   (internal rotation constant)
#   rho = 0.8102062230        (coupling parameter, dimensionless)
#   V3  = 373.554746 cm^-1   (3-fold barrier)
#   V6  = -1.319650 cm^-1    (6-fold correction)
#
# Potential convention (TorsionFourierPotential / direct Fourier form):
#   V(a) = v0 + sum_n [ vcos_n*cos(n*a) + vsin_n*sin(n*a) ]
#
# RAM (1-cos) convention to this convention mapping:
#   v0    = V3/2  + V6/2   =  186.117548
#   vcos3 = -V3/2          = -186.777373
#   vcos6 = -V6/2          =    0.659825
#
# n_basis: half-range of Fourier basis. Matrix size = 2*n_basis + 1.
#   n_basis=10 → 21 basis functions. Increase for higher barriers.
#
# symmetry_mode: 'c3' enables A/E symmetry labeling and block output.
#   Valid values: 'c3' (or '3fold', 'threefold'), null (no labeling).
#
# Phase-1 completeness terms (diagonal approximations):
#   F4, F6  : higher-order kinetic terms in (m - rho*K)^4, ^6
#   c_mk    : linear torsion-rotation coupling m*K
#   c_k2    : K^2 correction
#
# F_alpha block: coordinate-dependent effective torsion constant.
#   f0      : mean value (required, positive)
#   fcos/fsin: Fourier harmonics of F(alpha)
#
torsion_hamiltonian:
  enabled: true
  F: 27.64684641
  rho: 0.8102062230
  n_basis: 10
  n_levels: 12
  J_values: [0, 1, 2]
  K_values: [0, 1]
  units: cm-1
  symmetry_mode: c3         # A/E symmetry labeling for 3-fold barrier
  label_levels: true        # attach symmetry labels to each level row
  export_symmetry_blocks: false  # set true to diagonalize A/E1/E2 blocks separately
  potential:
    v0: 186.117548
    vcos: {3: -186.777373, 6: 0.659825}
    vsin: {}

  # Phase-1 completeness terms (all zero by default — enable if fitting):
  # F4: 0.0
  # F6: 0.0
  # c_mk: 0.0
  # c_k2: 0.0

  # Coordinate-dependent F(alpha) (optional):
  # F_alpha:
  #   f0: 27.64684641
  #   fcos: {3: 0.2}    # small 3-fold modulation of F
  #   fsin: {}

  # Objective targets (compare predicted levels to observed — enable for fitting):
  use_in_selection: false
  # selection_weight: 0.01
  # targets:
  #   - {J: 0, K: 0, level_index: 0, energy_cm-1: 0.0}    # vt=0 A ground
  #   - {J: 0, K: 0, level_index: 1, energy_cm-1: 9.12}   # vt=0 E ground (tunnel split)

  # Transition targets (observed transition frequencies in cm^-1):
  # transitions:
  #   - {J_lo: 0, K_lo: 0, level_lo: 0, J_hi: 1, K_hi: 0, level_hi: 0, freq_cm-1: 1.053}

  # Parameter uncertainty (enable when targets are supplied):
  uncertainty:
    enabled: false
    include_completeness: false
    damping: 1.0e-8
    rank_tol: 1.0e-10
    default_sigma_cm1: 1.0

  # Phase-2 scan averaging (supply a torsion scan to average A/B/C):
  # scan:
  #   name: methanol_scan
  #   angle_unit: degrees
  #   energy_unit: hartree
  #   mode: quantum           # 'quantum', 'quantum_thermal', or 'boltzmann'
  #   periodic: true
  #   atoms: [0, 1, 5, 2]    # atom indices defining the torsion dihedral (ORCA output order)
  #   hindered_rotor_model:
  #     name: CH3_rotor
  #     symmetry_number: 3
  #     rotational_constant_F: 27.64684641
  #     fourier_terms: {3: 373.554746}
  #     basis_size: 81         # odd, >= 3; basis_size = 2*n_basis+1 (hindered_rotor convention)
  #   # Optional CSV ingestion for potential fitting:
  #   # csv_path: scans/methanol_torsion.csv
  #   # phi_col: phi_deg
  #   # energy_col: energy_cm1
  #   # csv_angle_unit: degrees
  #   # csv_energy_unit: cm-1
  #   fit_potential:           # Phase-2: fit Fourier coefficients from scan energies
  #     enabled: false
  #     n_harmonics: 3         # highest harmonic order to fit (1..n_harmonics)
  #     symmetry_number: 3     # only harmonics divisible by this are included
  #     cosine_only: true      # omit sin terms (Cs-symmetric rotor)
  #     zero_at_minimum: true  # shift v0 so min(V)=0
  #   grid_points: []          # fill with {phi, energy, geometry, rotational_constants}

output:
  root: runs
  artifacts: true
